name: ci

on: [push, pull_request]

jobs:
  game:
    runs-on: ubuntu-latest
    # The canister depends on crown-derive and crown-salt by relative path, so
    # the checkout has to reproduce the sibling layout those paths expect.
    # A lone checkout cannot even load the manifest.
    defaults:
      run:
        working-directory: crown-games/Conditional-Tasks
    steps:
      - uses: actions/checkout@v4
        with:
          path: crown-games/Conditional-Tasks
      - uses: actions/checkout@v4
        with:
          repository: bocchisan/Crown-Factory
          path: Crown-Factory
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: dfx (ships the pocket-ic server the canister tests run against)
        run: |
          DFXVM_INIT_YES=true sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"
      - run: dfx --version
      # Builds the release wasm and runs the #[ignore]-marked canister tests.
      # Without this the whole PocketIC layer never runs in CI.
      - run: ./scripts/test-canister.sh
      - run: ./scripts/lint-boundaries.sh
      - name: core and factory untouched
        run: '! git ls-files | grep -E "^(crown-core|crown-factory)/"'
