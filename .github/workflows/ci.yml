name: ci

on: [push, pull_request]

jobs:
  game:
    runs-on: ubuntu-latest
    # The canister depends on crown-derive and crown-salt by relative path, so
    # the checkout has to reproduce the sibling layout those paths expect.
    # A lone checkout cannot even load the manifest.
    defaults:
      run:
        working-directory: crown-games/Conditional-Tasks
    steps:
      - uses: actions/checkout@v4
        with:
          path: crown-games/Conditional-Tasks
      - uses: actions/checkout@v4
        with:
          repository: bocchisan/Crown-Factory
          path: Crown-Factory
      # The e2e driver pins the splitter by path into Crown-Core; check it too.
      - uses: actions/checkout@v4
        with:
          repository: bocchisan/Crown-Core
          path: Crown-Core
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # The server the PocketIC client talks to, pinned to the version the
      # tests are verified against. scripts/test-canister.sh honours this.
      - name: pocket-ic server
        run: |
          curl -fsSL https://github.com/dfinity/pocketic/releases/download/13.0.0/pocket-ic-x86_64-linux.gz \
            | gunzip > "$HOME/pocket-ic"
          chmod +x "$HOME/pocket-ic"
          echo "POCKET_IC_BIN=$HOME/pocket-ic" >> "$GITHUB_ENV"
      # Builds the release wasm and runs the #[ignore]-marked canister tests.
      # Without this the whole PocketIC layer never runs in CI.
      - run: ./scripts/test-canister.sh
      - run: ./scripts/lint-boundaries.sh
      # The e2e driver is out of the workspace (its path deps reach into the
      # sibling repos), so nothing else compiles it: check it explicitly.
      - run: cargo check --manifest-path e2e/solana-driver/Cargo.toml
      - name: core and factory untouched
        run: '! git ls-files | grep -iE "^(crown-core|crown-factory)/"'
